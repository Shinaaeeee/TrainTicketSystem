services:
  # ============================================
  # Nginx Load Balancer
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - train-network
    restart: unless-stopped

  # ============================================
  # App Instances (x3)
  # ============================================
  app1:
    build:
      context: ./TrainTicketSystem
      dockerfile: Dockerfile
    container_name: trainticket-app1
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MyCnn=Data Source=sqlserver;Initial Catalog=TrainTicketDB;User ID=sa;Password=YourStrong!Passw0rd;Encrypt=false;TrustServerCertificate=true;
      - ConnectionStrings__Redis=redis:6379
      - INSTANCE_NAME=app1
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - train-network
    restart: unless-stopped

  app2:
    build:
      context: ./TrainTicketSystem
      dockerfile: Dockerfile
    container_name: trainticket-app2
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MyCnn=Data Source=sqlserver;Initial Catalog=TrainTicketDB;User ID=sa;Password=YourStrong!Passw0rd;Encrypt=false;TrustServerCertificate=true;
      - ConnectionStrings__Redis=redis:6379
      - INSTANCE_NAME=app2
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - train-network
    restart: unless-stopped

  app3:
    build:
      context: ./TrainTicketSystem
      dockerfile: Dockerfile
    container_name: trainticket-app3
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MyCnn=Data Source=sqlserver;Initial Catalog=TrainTicketDB;User ID=sa;Password=YourStrong!Passw0rd;Encrypt=false;TrustServerCertificate=true;
      - ConnectionStrings__Redis=redis:6379
      - INSTANCE_NAME=app3
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - train-network
    restart: unless-stopped

  # ============================================
  # Redis - Session Store & Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - train-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ============================================
  # SQL Server
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - train-network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# ============================================
# Volumes & Networks
# ============================================
volumes:
  redis-data:
  sqlserver-data:

networks:
  train-network:
    driver: bridge
